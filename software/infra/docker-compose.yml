services:
  mongo:
    image: mongo:7
    ports: [ "27017:27017" ]
    volumes: [ "mongo-data:/data/db" ]

  chroma:
    image: chromadb/chroma:latest
    ports: [ "8001:8000" ]
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma
    volumes: [ "chroma-data:/chroma" ]

  backend:
    build:
      context: ../backend
      dockerfile: ../infra/dockerfiles/backend.Dockerfile
    depends_on: [ mongo ]
    ports: [ "8000:8000" ]
    command: uvicorn app:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ../frontend
    dockerfile: ../infra/dockerfiles/frontend.Dockerfile
    depends_on: [ backend ]
    ports: [ "5173:5173" ]
    command: npm run dev -- --host

volumes:
  mongo-data:
  chroma-data:
